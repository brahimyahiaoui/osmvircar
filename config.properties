############################################
# Triangulation
############################################

# Forcer l’algorithme robuste
triangulation = jts

# Ancienne clé (certaines versions)
triangulation.algorithm = jts

# Désactiver explicitement Poly2Tri si supporté
use.poly2tri = false
poly2tri.enabled = false


############################################
# Tolérance géométrique (évite les crashes)
############################################

# Fusionne les points trop proches
geometry.merge.close.nodes = true

# Tolérance numérique
geometry.epsilon = 1e-7


############################################
# Surfaces (optionnel mais utile)
############################################

# Ignore les surfaces dégénérées
surface.skip.invalid = true

# Évite les surfaces trop complexes
surface.max.nodes = 5000
